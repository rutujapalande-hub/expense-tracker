<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>
    <h2>Total Balance: ₹{{ total }}</h2>

    <form method="post">
        Amount: <input type="number" name="amount" required>
        Type:
        <select name="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>
        <button type="submit">Add</button>
    </form>

    <h3>Transactions:</h3>
    <ul>
        {% for amt, t in data %}
            <li>{{ t }}: ₹{{ amt }}</li>
        {% endfor %}
    </ul>
</body>
</html>
